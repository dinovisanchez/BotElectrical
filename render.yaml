services:
  - type: web
    name: dinobot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RETIE_STORE_NAME
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.0
